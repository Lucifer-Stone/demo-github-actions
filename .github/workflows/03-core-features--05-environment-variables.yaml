name: Environment Variables

on:
    workflow_dispatch:

env:
    WORKFLOW_ENV: "I am workflow scoped"

jobs:
    job-1:
        runs-on: ubuntu-latest
        env:
            JOB_ENV: "I am job scoped"
        steps:
            - name: Inspect scopes Job 1 Step 1
            env:
                STEP_ENV: "I am step scoped"
            run:
                - echo "WORKFLOW VAR: $WORKFLOW_ENV"        # VISIBLE
                - echo "JOB VAR: $JOB_ENV"                  # VISIBLE
                - echo "STEP VAR: $STEP_ENV                 # VISIBLE


            - name: Inspect scopes Job 1 Step 2
            run:
                - echo "WORKFLOW VAR: $WORKFLOW_ENV"        # VISIBLE
                - echo "JOB VAR: $JOB_ENV"                  # VISIBLE
                - echo "STEP VAR: $STEP_ENV"                # NOT VISIBLE

    job-2:
        runs-on: ubuntu-latest
        steps:
            - name: Inspect scopes Job 2 Step 1
            run:
                - echo "WORKFLOW VAR: $WORKFLOW_ENV"        # VISIBLE
                - echo "JOB VAR: $JOB_ENV"                  # NOT VISIBLE
                - echo "STEP VAR: $STEP_ENV"                # NOT VISIBLE
